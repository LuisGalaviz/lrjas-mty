<div class="login-container">
  <div class="login-card">
    <div class="login-logo">LR JAS</div>
    <div class="login-sub">Monterrey</div>
    <h1>Acceso Administrativo</h1>
    <p>Ingresa tus credenciales para continuar</p>
    <div class="form-group">
      <input type="text" placeholder="Usuario" [(ngModel)]="usuario" (keyup.enter)="login()" />
    </div>
    <div class="form-group">
      <input type="password" placeholder="Contrasena" [(ngModel)]="password" (keyup.enter)="login()" />
    </div>
    <div class="error" *ngIf="error">{{ error }}</div>
    <button (click)="login()" class="btn-login">Ingresar</button>
  </div>
</div>
